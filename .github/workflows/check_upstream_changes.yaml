name: Check Upstream Changes

on:
  pull_request_target:
    paths:
    - '**/upstream/**'

permissions:
  # These permissions are required to post PR reviews and to add labels.
  pull-requests: write

jobs:
  check-upstream-changes:
    runs-on: ubuntu-latest
    steps:
    - name: Detect changed upstream paths
      id: upstream_changes
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        changed="$(
          gh api \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            --paginate \
            --jq '.[] | .filename' | grep '/upstream/'
        )"
        echo "The following files inside upstream folders were modified:"
        echo "$changed"
        {
          echo "changed_files<<EOF"
          echo "$changed"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Check if PR author is a kubeflow organization member
      id: org_check
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        PR_AUTHOR: ${{ github.event.pull_request.user.login }}
      run: |
        org_members="$(
          gh api \
            "repos/kubeflow/internal-acls/contents/github-orgs/kubeflow/org.yaml" \
            --jq '.content' | base64 --decode | \
            yq -o=json | \
            jq -r '.orgs.kubeflow | (.admins // []) + (.members // []) | .[]'
        )"
        if echo "$org_members" | grep -qx "$PR_AUTHOR"; then
          echo "PR author $PR_AUTHOR is a kubeflow organization member."
          echo "is_org_member=true" >> "$GITHUB_OUTPUT"
        else
          echo "PR author $PR_AUTHOR is not a kubeflow organization member."
          echo "is_org_member=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Apply upstream-changed label
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh pr edit "${{ github.event.pull_request.number }}" --add-label "upstream-changed"

    - name: Post PR review
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        CHANGED_FILES: ${{ steps.upstream_changes.outputs.changed_files }}
        # GitHub does not allow a repository's own token to submit REQUEST_CHANGES reviews
        # on PRs from within the same repository, only on PRs from forks. For internal PRs
        # we fall back to a plain comment so the step does not fail.
        IS_FORK: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
        IS_ORG_MEMBER: ${{ steps.org_check.outputs.is_org_member }}
      run: |
        review_body_file="$(mktemp)"
        trap 'rm -f "$review_body_file"' EXIT

        {
          printf '> [!WARNING]\n'
          printf '> This PR modifies files inside one or more `upstream` folders. Changes to upstream manifests are usually unintended and should be reviewed carefully.\n'
          printf '>\n'
          printf '> **Changed upstream files:**\n'
          printf '> ```\n'
          printf '%s\n' "$CHANGED_FILES" | sed 's/^/> /'
          printf '> ```\n'
        } > "$review_body_file"

        if [[ "$IS_FORK" = "true" && "$IS_ORG_MEMBER" = "false" ]]; then
          gh pr review "${{ github.event.pull_request.number }}" \
            --request-changes \
            --body-file "$review_body_file"
        else
          gh pr review "${{ github.event.pull_request.number }}" \
            --comment \
            --body-file "$review_body_file"
        fi
